<div class="login-wrapper">
    <div class="login-header">
      <img src="/logo.png" alt="MIGRAPP Logo" class="brand-logo" />
    </div>
  
    <div class="login-top-content">
      <div class="user-logo"></div>
      <h1><strong>Admin</strong> login</h1>
    </div>
  
    <div class="flex">
      <div class="container">
        <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
          <div class="inputs">
            <input type="email" placeholder="Email" name="email" [(ngModel)]="email" required/>
          </div>
          <div class="inputs">
            <input type="password" placeholder="Password" name="password" [(ngModel)]="password" required/>
          </div>
          
          <button type="submit" class="mainbutton login-button" [disabled]="loginForm.invalid">Login</button>
  
          <div class="remember-checkbox">
            <label><input type="checkbox"/>Remember me</label>
          </div>
        </form>
      </div>
    </div>
</div>
