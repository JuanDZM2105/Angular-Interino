<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <p>{{date1 | date:"dd-MMMM-yyyy" }}</p>

  @for (pelicula of peliculas; track $index) {
  <div>
    <div>
      <div>
        <img [src] = "pelicula.poster" priority width="200" height="400"/>
        
      </div>
      <div>
        <p>{{pelicula.titulo}}</p>
        <p>{{pelicula.precio}}</p>
      </div>
    </div>
  </div>
  }
    
  
</body>
</html>
